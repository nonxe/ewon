<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="SHS Messenger — Premium messaging experience">
<title>SHS Messenger</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#000000;--bg-secondary:#0a0a0a;--bg-tertiary:#111111;--bg-card:#161616;
  --text-primary:#f5f5f7;--text-secondary:rgba(245,245,247,0.6);--text-tertiary:rgba(245,245,247,0.35);
  --accent:#a78bfa;--accent-bright:#c4b5fd;--accent-dim:rgba(167,139,250,0.15);
  --red:#f87171;--green:#34d399;--blue:#60a5fa;
  --border-subtle:rgba(255,255,255,0.06);--border-light:rgba(255,255,255,0.12);
  --glass:rgba(255,255,255,0.03);--glass-hover:rgba(255,255,255,0.06);
  --ease:cubic-bezier(0.22,1,0.36,1);--ease-bounce:cubic-bezier(0.34,1.56,0.64,1);
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
  --sidebar-w:340px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg-primary);color:var(--text-primary);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  -webkit-tap-highlight-color:transparent;font-size:15px;line-height:1.5}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
::selection{background:var(--accent);color:#000}
input,textarea,button{font-family:inherit;font-size:inherit;color:inherit;border:none;outline:none;background:none}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}

/* ═══════ APP SHELL ═══════ */
.app{display:flex;height:100%;width:100%;overflow:hidden;position:relative}

/* ═══════ SIDEBAR ═══════ */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;
  background:var(--bg-secondary);border-right:1px solid var(--border-subtle);
  display:flex;flex-direction:column;position:relative;z-index:10;
  transition:transform .4s var(--ease),opacity .4s var(--ease);
}
.sidebar-header{
  padding:20px 20px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border-subtle);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding-top:calc(20px + var(--safe-top));
}
.sidebar-header h1{font-size:22px;font-weight:700;letter-spacing:-.3px;
  background:linear-gradient(135deg,var(--accent),var(--accent-bright));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-header .compose-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--accent-dim);display:flex;align-items:center;justify-content:center;
  transition:all .25s var(--ease);
}
.sidebar-header .compose-btn:hover{background:rgba(167,139,250,0.25);transform:scale(1.1)}
.sidebar-header .compose-btn svg{width:18px;height:18px;color:var(--accent)}

.search-box{padding:12px 20px}
.search-box input{
  width:100%;height:40px;padding:0 16px 0 40px;border-radius:12px;
  background:var(--glass);border:1px solid var(--border-subtle);
  color:var(--text-primary);font-size:14px;
  transition:all .25s var(--ease);
}
.search-box input::placeholder{color:var(--text-tertiary)}
.search-box input:focus{border-color:var(--accent);background:rgba(167,139,250,0.05);
  box-shadow:0 0 0 3px rgba(167,139,250,0.1)}
.search-box{position:relative}
.search-box svg{position:absolute;left:32px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--text-tertiary);pointer-events:none}

.contact-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:4px 8px}
.contact-item{
  display:flex;align-items:center;gap:14px;padding:14px 14px;
  border-radius:var(--radius-sm);cursor:pointer;position:relative;
  transition:all .2s var(--ease);margin-bottom:2px;
}
.contact-item::before{
  content:'';position:absolute;inset:0;border-radius:var(--radius-sm);
  background:var(--glass-hover);opacity:0;transition:opacity .2s var(--ease);
}
.contact-item:hover::before,.contact-item.active::before{opacity:1}
.contact-item.active::before{background:var(--accent-dim)}
.contact-item.active{box-shadow:inset 0 0 0 1px rgba(167,139,250,0.15)}

.avatar{
  width:48px;height:48px;min-width:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:17px;letter-spacing:.5px;position:relative;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
}
.avatar .status-dot{
  position:absolute;bottom:1px;right:1px;width:13px;height:13px;
  border-radius:50%;border:2.5px solid var(--bg-secondary);
  transition:background .3s var(--ease);
}
.avatar .status-dot.online{background:var(--green)}
.avatar .status-dot.offline{background:rgba(255,255,255,0.2)}

.contact-info{flex:1;min-width:0;position:relative;z-index:1}
.contact-name{font-weight:600;font-size:15px;margin-bottom:2px;
  display:flex;align-items:center;justify-content:space-between}
.contact-name .time{font-weight:400;font-size:12px;color:var(--text-tertiary)}
.contact-preview{font-size:13px;color:var(--text-secondary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;
  display:flex;align-items:center;gap:4px}
.contact-preview .unread-badge{
  min-width:20px;height:20px;border-radius:10px;
  background:var(--accent);color:#000;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 6px;
  margin-left:auto;flex-shrink:0;
  animation:badgePop .35s var(--ease-bounce);
}
@keyframes badgePop{0%{transform:scale(0)}100%{transform:scale(1)}}

/* ═══════ CHAT AREA ═══════ */
.chat-area{
  flex:1;display:flex;flex-direction:column;height:100%;
  background:var(--bg-primary);position:relative;overflow:hidden;
}

/* Empty state */
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;opacity:.6;
}
.empty-state svg{width:64px;height:64px;color:var(--text-tertiary);
  animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.empty-state p{font-size:16px;color:var(--text-tertiary);font-weight:500}

/* Chat header */
.chat-header{
  display:flex;align-items:center;gap:14px;padding:14px 20px;
  border-bottom:1px solid var(--border-subtle);
  background:rgba(10,10,10,0.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  z-index:5;padding-top:calc(14px + var(--safe-top));
}
.chat-header .back-btn{
  display:none;width:36px;height:36px;border-radius:50%;
  background:var(--glass);align-items:center;justify-content:center;
  transition:all .2s var(--ease);flex-shrink:0;
}
.chat-header .back-btn:hover{background:var(--glass-hover)}
.chat-header .back-btn svg{width:20px;height:20px;color:var(--text-secondary)}
.chat-header .avatar{width:40px;height:40px;min-width:40px;font-size:15px}
.chat-header .avatar .status-dot{width:11px;height:11px;border-width:2px;
  border-color:rgba(10,10,10,0.8)}
.chat-header-info{flex:1}
.chat-header-info .name{font-weight:600;font-size:16px}
.chat-header-info .status-text{font-size:12px;color:var(--text-secondary);
  display:flex;align-items:center;gap:5px}
.chat-header-info .status-text .typing-indicator{display:none;gap:3px;align-items:center}
.chat-header-info .status-text .typing-indicator.show{display:inline-flex}
.chat-header-info .status-text .typing-indicator span{
  width:5px;height:5px;border-radius:50%;background:var(--accent);
  animation:typingBounce .6s ease-in-out infinite;
}
.chat-header-info .status-text .typing-indicator span:nth-child(2){animation-delay:.1s}
.chat-header-info .status-text .typing-indicator span:nth-child(3){animation-delay:.2s}
@keyframes typingBounce{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

.chat-header-actions{display:flex;gap:6px}
.chat-header-actions button{
  width:36px;height:36px;border-radius:50%;
  background:var(--glass);display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--ease);
}
.chat-header-actions button:hover{background:var(--glass-hover);transform:scale(1.05)}
.chat-header-actions button svg{width:18px;height:18px;color:var(--text-secondary)}

/* Messages area */
.messages-container{
  flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 20px;
  display:flex;flex-direction:column;gap:4px;
  scroll-behavior:smooth;
}
.messages-container::-webkit-scrollbar{width:3px}

.date-divider{
  text-align:center;padding:16px 0 8px;
  font-size:12px;color:var(--text-tertiary);font-weight:500;
  display:flex;align-items:center;gap:12px;
}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--border-subtle)}

.message-row{display:flex;align-items:flex-end;gap:8px;max-width:100%;
  animation:msgSlide .35s var(--ease) both}
.message-row.sent{justify-content:flex-end}
.message-row.received{justify-content:flex-start}

@keyframes msgSlide{
  0%{opacity:0;transform:translateY(12px) scale(0.97)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}

.message-bubble{
  max-width:75%;padding:10px 14px;position:relative;
  font-size:14.5px;line-height:1.45;word-wrap:break-word;
  transition:all .15s var(--ease);
}
.message-bubble:hover{filter:brightness(1.05)}
.message-row.sent .message-bubble{
  background:linear-gradient(135deg,var(--accent),#8b6fdf);
  color:#fff;border-radius:18px 18px 4px 18px;
  box-shadow:0 2px 16px rgba(167,139,250,0.2);
}
.message-row.received .message-bubble{
  background:var(--bg-card);color:var(--text-primary);
  border-radius:18px 18px 18px 4px;border:1px solid var(--border-subtle);
  box-shadow:0 2px 12px rgba(0,0,0,0.2);
}
.message-meta{
  display:flex;align-items:center;gap:5px;justify-content:flex-end;
  margin-top:4px;font-size:11px;color:rgba(255,255,255,0.5);
}
.message-row.received .message-meta{color:var(--text-tertiary)}
.message-meta .read-receipt{display:flex;align-items:center}
.message-meta .read-receipt svg{width:14px;height:14px}
.message-meta .read-receipt.read svg{color:var(--accent-bright)}
.message-meta .read-receipt.delivered svg{color:rgba(255,255,255,0.4)}

/* Input bar */
.input-bar{
  padding:12px 16px;border-top:1px solid var(--border-subtle);
  background:rgba(10,10,10,0.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;align-items:flex-end;gap:10px;
  padding-bottom:calc(12px + var(--safe-bottom));
}
.input-bar .attach-btn{
  width:40px;height:40px;min-width:40px;border-radius:50%;
  background:var(--glass);display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--ease);
}
.input-bar .attach-btn:hover{background:var(--glass-hover);transform:scale(1.05)}
.input-bar .attach-btn svg{width:20px;height:20px;color:var(--text-secondary)}

.input-wrapper{
  flex:1;position:relative;display:flex;align-items:flex-end;
  background:var(--bg-card);border:1px solid var(--border-subtle);
  border-radius:22px;padding:4px 6px 4px 18px;
  transition:all .25s var(--ease);min-height:44px;
}
.input-wrapper:focus-within{border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(167,139,250,0.1)}
.input-wrapper textarea{
  flex:1;resize:none;background:none;border:none;outline:none;
  color:var(--text-primary);font-size:15px;line-height:1.4;
  padding:8px 0;max-height:120px;min-height:24px;
}
.input-wrapper textarea::placeholder{color:var(--text-tertiary)}
.send-btn{
  width:36px;height:36px;min-width:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#8b6fdf);
  display:flex;align-items:center;justify-content:center;
  transition:all .25s var(--ease);transform:scale(0);opacity:0;
}
.send-btn.visible{transform:scale(1);opacity:1}
.send-btn:hover{filter:brightness(1.15);transform:scale(1.08)}
.send-btn:active{transform:scale(0.95)}
.send-btn svg{width:18px;height:18px;color:#fff;margin-left:2px}

/* ═══════ MOBILE ═══════ */
@media(max-width:768px){
  .sidebar{position:absolute;inset:0;width:100%;min-width:100%;z-index:20;
    background:var(--bg-primary)}
  .sidebar.hidden{transform:translateX(-100%);opacity:0;pointer-events:none}
  .chat-area.hidden{display:none}
  .chat-header .back-btn{display:flex}
  .contact-preview{max-width:60vw}
  .message-bubble{max-width:85%}
}

/* ═══════ ANIMATIONS ═══════ */
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes slideUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s var(--ease) both}
.slide-up{animation:slideUp .5s var(--ease) both}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>Messages</h1>
      <button class="compose-btn" title="New message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
    </div>
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search conversations..." autocomplete="off">
    </div>
    <div class="contact-list" id="contactList"></div>
  </aside>

  <!-- CHAT AREA -->
  <main class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <p>Select a conversation to start messaging</p>
    </div>
  </main>
</div>

<script>
(() => {
'use strict';

/* ═══════ CONTACTS DATA ═══════ */
const CONTACTS = [
  { id:'aryan',  name:'Aryan',  color:'#6366f1', status:'online',  tagline:'Building the future 🚀' },
  { id:'meera',  name:'Meera',  color:'#ec4899', status:'online',  tagline:'Design is intelligence made visible ✨' },
  { id:'dev',    name:'Dev',    color:'#14b8a6', status:'offline', tagline:'Code. Coffee. Repeat. ☕' },
  { id:'priya',  name:'Priya',  color:'#f59e0b', status:'online',  tagline:'Data never lies 📊' },
  { id:'karan',  name:'Karan',  color:'#ef4444', status:'offline', tagline:'Game on 🎮' },
];

/* ═══════ AUTO-REPLY POOL ═══════ */
const REPLIES = [
  "That's really interesting! Tell me more 🤔",
  "Haha, I totally agree with you 😄",
  "Wait, are you serious? 😳",
  "Lol that's so relatable 😂",
  "Yeah, I was thinking the same thing!",
  "Sounds good to me! Let's do it 🙌",
  "I'll get back to you on that",
  "That's a great idea actually ✨",
  "No way! When did that happen?",
  "Hmm, let me think about it 🤔",
  "Sure, I'm down for that!",
  "Oh nice, that's really cool 🔥",
  "I just saw that too! So good 👀",
  "Can't wait for the weekend though 🎉",
  "Same here! It's been crazy lately",
  "Thanks for letting me know 🙏",
  "Okay got it, makes sense 👍",
  "Wow I didn't know that!",
  "You always have the best ideas 💡",
  "Let's catch up soon, it's been a while!"
];

const INITIAL_MESSAGES = {
  aryan: [
    { text: "Hey! How's the project going?", sent: false, time: Date.now() - 3600000 * 3 },
    { text: "It's going great! Almost done with the frontend 🎉", sent: true, time: Date.now() - 3600000 * 2.9 },
    { text: "That's awesome! Can't wait to see it", sent: false, time: Date.now() - 3600000 * 2.8 },
  ],
  meera: [
    { text: "Check out this new design I made!", sent: false, time: Date.now() - 86400000 },
    { text: "Omg it looks incredible! 😍", sent: true, time: Date.now() - 86400000 + 60000 },
  ],
  dev: [
    { text: "Bro the new API is insane 🔥", sent: false, time: Date.now() - 86400000 * 2 },
    { text: "Which one? The one we discussed?", sent: true, time: Date.now() - 86400000 * 2 + 120000 },
    { text: "Yeah! Response times are under 50ms", sent: false, time: Date.now() - 86400000 * 2 + 180000 },
  ],
  priya: [
    { text: "The analytics dashboard is ready for review", sent: false, time: Date.now() - 7200000 },
    { text: "Perfect, I'll take a look right now 👀", sent: true, time: Date.now() - 7000000 },
  ],
  karan: [
    { text: "GG! That was an intense match 🎮", sent: false, time: Date.now() - 86400000 * 3 },
    { text: "We need a rematch for sure!", sent: true, time: Date.now() - 86400000 * 3 + 60000 },
  ]
};

/* ═══════ STATE ═══════ */
let currentContact = null;
let conversations = {};
let typingTimeouts = {};

/* ═══════ HELPERS ═══════ */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function loadConversations() {
  try {
    const saved = localStorage.getItem('shs_conversations');
    if (saved) {
      conversations = JSON.parse(saved);
    } else {
      conversations = JSON.parse(JSON.stringify(INITIAL_MESSAGES));
      saveConversations();
    }
  } catch {
    conversations = JSON.parse(JSON.stringify(INITIAL_MESSAGES));
  }
}

function saveConversations() {
  try { localStorage.setItem('shs_conversations', JSON.stringify(conversations)); } catch {}
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
}

function formatDate(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now.setHours(0,0,0,0) - new Date(ts).setHours(0,0,0,0);
  if (diff === 0) return 'Today';
  if (diff === 86400000) return 'Yesterday';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatPreviewTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now.getTime() - ts;
  if (diff < 60000) return 'now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h';
  if (diff < 604800000) return Math.floor(diff/86400000) + 'd';
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function getInitial(name) { return name.charAt(0).toUpperCase(); }

/* ═══════ RENDER CONTACT LIST ═══════ */
function renderContacts(filter = '') {
  const list = $('#contactList');
  const filtered = CONTACTS.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));
  
  // Sort by last message time
  filtered.sort((a, b) => {
    const aLast = (conversations[a.id] && conversations[a.id].length) ? conversations[a.id][conversations[a.id].length-1].time : 0;
    const bLast = (conversations[b.id] && conversations[b.id].length) ? conversations[b.id][conversations[b.id].length-1].time : 0;
    return bLast - aLast;
  });

  list.innerHTML = filtered.map((c, i) => {
    const msgs = conversations[c.id] || [];
    const last = msgs[msgs.length - 1];
    const preview = last ? (last.sent ? 'You: ' : '') + last.text : c.tagline;
    const time = last ? formatPreviewTime(last.time) : '';
    const isActive = currentContact && currentContact.id === c.id;
    
    return `
      <div class="contact-item ${isActive ? 'active' : ''}" data-id="${c.id}" style="animation-delay:${i*50}ms">
        <div class="avatar" style="background:linear-gradient(135deg,${c.color},${c.color}dd)">
          ${getInitial(c.name)}
          <div class="status-dot ${c.status}"></div>
        </div>
        <div class="contact-info">
          <div class="contact-name">
            <span>${c.name}</span>
            <span class="time">${time}</span>
          </div>
          <div class="contact-preview">
            <span>${truncate(preview, 38)}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.contact-item').forEach(el => {
    el.addEventListener('click', () => {
      const contact = CONTACTS.find(c => c.id === el.dataset.id);
      if (contact) openChat(contact);
    });
  });
}

function truncate(str, len) {
  return str.length > len ? str.substring(0, len) + '…' : str;
}

/* ═══════ OPEN CHAT ═══════ */
function openChat(contact) {
  currentContact = contact;
  const chatArea = $('#chatArea');
  const sidebar = $('#sidebar');

  // Mobile: hide sidebar
  if (window.innerWidth <= 768) {
    sidebar.classList.add('hidden');
  }

  // Build chat UI
  chatArea.innerHTML = `
    <div class="chat-header">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="avatar" style="background:linear-gradient(135deg,${contact.color},${contact.color}dd)">
        ${getInitial(contact.name)}
        <div class="status-dot ${contact.status}"></div>
      </div>
      <div class="chat-header-info">
        <div class="name">${contact.name}</div>
        <div class="status-text">
          <span class="status-label">${contact.status === 'online' ? 'Online' : 'Last seen recently'}</span>
          <span class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
          </span>
        </div>
      </div>
      <div class="chat-header-actions">
        <button title="Voice call"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></button>
        <button title="Video call"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></button>
      </div>
    </div>
    <div class="messages-container" id="messagesContainer"></div>
    <div class="input-bar">
      <button class="attach-btn" title="Attach file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <div class="input-wrapper">
        <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>`;

  renderMessages(contact.id);
  bindChatEvents();
  renderContacts($('#searchInput').value);
}

/* ═══════ RENDER MESSAGES ═══════ */
function renderMessages(contactId) {
  const container = $('#messagesContainer');
  const msgs = conversations[contactId] || [];
  let html = '';
  let lastDate = '';

  msgs.forEach((msg, i) => {
    const date = formatDate(msg.time);
    if (date !== lastDate) {
      html += `<div class="date-divider">${date}</div>`;
      lastDate = date;
    }

    const readIcon = msg.sent ? `
      <span class="read-receipt ${i < msgs.length - 1 || !msg.sent ? 'read' : 'delivered'}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2 12 7 17 12 12"/>
          <polyline points="9 12 14 17 22 6"/>
        </svg>
      </span>` : '';

    html += `
      <div class="message-row ${msg.sent ? 'sent' : 'received'}" style="animation-delay:${i * 30}ms">
        <div class="message-bubble">
          <div class="message-text">${escapeHtml(msg.text)}</div>
          <div class="message-meta">
            <span>${formatTime(msg.time)}</span>
            ${readIcon}
          </div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

function escapeHtml(text) {
  const map = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#039;' };
  return text.replace(/[&<>"']/g, m => map[m]);
}

/* ═══════ CHAT EVENTS ═══════ */
function bindChatEvents() {
  const input = $('#messageInput');
  const sendBtn = $('#sendBtn');
  const backBtn = $('#backBtn');

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendBtn.classList.toggle('visible', input.value.trim().length > 0);
  });

  // Send on Enter (Shift+Enter for newline)
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  if (backBtn) {
    backBtn.addEventListener('click', () => {
      currentContact = null;
      $('#sidebar').classList.remove('hidden');
      $('#chatArea').innerHTML = `
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <p>Select a conversation to start messaging</p>
        </div>`;
      renderContacts($('#searchInput').value);
    });
  }

  input.focus();
}

/* ═══════ SEND MESSAGE ═══════ */
function sendMessage() {
  const input = $('#messageInput');
  const text = input.value.trim();
  if (!text || !currentContact) return;

  const msg = { text, sent: true, time: Date.now() };
  if (!conversations[currentContact.id]) conversations[currentContact.id] = [];
  conversations[currentContact.id].push(msg);
  saveConversations();

  // Append the message to DOM directly for smooth animation
  appendMessageToDOM(msg);
  
  input.value = '';
  input.style.height = 'auto';
  $('#sendBtn').classList.remove('visible');
  
  renderContacts($('#searchInput').value);
  
  // Trigger auto-reply
  scheduleReply(currentContact.id);
}

function appendMessageToDOM(msg) {
  const container = $('#messagesContainer');
  if (!container) return;
  
  const msgs = conversations[currentContact.id];
  
  // Check if we need a date divider
  const date = formatDate(msg.time);
  const prevMsgs = msgs.slice(0, -1);
  const lastPrevMsg = prevMsgs[prevMsgs.length - 1];
  const prevDate = lastPrevMsg ? formatDate(lastPrevMsg.time) : '';
  
  if (date !== prevDate) {
    const divider = document.createElement('div');
    divider.className = 'date-divider';
    divider.textContent = date;
    container.appendChild(divider);
  }

  const readIcon = msg.sent ? `
    <span class="read-receipt delivered">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="2 12 7 17 12 12"/>
        <polyline points="9 12 14 17 22 6"/>
      </svg>
    </span>` : '';

  const row = document.createElement('div');
  row.className = `message-row ${msg.sent ? 'sent' : 'received'}`;
  row.innerHTML = `
    <div class="message-bubble">
      <div class="message-text">${escapeHtml(msg.text)}</div>
      <div class="message-meta">
        <span>${formatTime(msg.time)}</span>
        ${readIcon}
      </div>
    </div>`;
  container.appendChild(row);
  
  requestAnimationFrame(() => {
    container.scrollTop = container.scrollHeight;
  });
}

/* ═══════ AUTO-REPLY ═══════ */
function scheduleReply(contactId) {
  if (typingTimeouts[contactId]) clearTimeout(typingTimeouts[contactId]);

  const delay = 800 + Math.random() * 1500;
  
  // Show typing indicator
  const typingEl = $('#typingIndicator');
  const statusLabel = document.querySelector('.status-label');
  if (typingEl && currentContact && currentContact.id === contactId) {
    typingEl.classList.add('show');
    if (statusLabel) statusLabel.textContent = 'typing';
  }

  typingTimeouts[contactId] = setTimeout(() => {
    // Hide typing
    if (typingEl && currentContact && currentContact.id === contactId) {
      typingEl.classList.remove('show');
      const contact = CONTACTS.find(c => c.id === contactId);
      if (statusLabel && contact) {
        statusLabel.textContent = contact.status === 'online' ? 'Online' : 'Last seen recently';
      }
    }

    const reply = REPLIES[Math.floor(Math.random() * REPLIES.length)];
    const replyMsg = { text: reply, sent: false, time: Date.now() };
    if (!conversations[contactId]) conversations[contactId] = [];
    conversations[contactId].push(replyMsg);
    saveConversations();

    // Mark previous sent messages as read
    conversations[contactId].forEach(m => { if (m.sent) m.read = true; });
    saveConversations();

    if (currentContact && currentContact.id === contactId) {
      appendMessageToDOM(replyMsg);
      // Update read receipts on sent messages
      document.querySelectorAll('.message-row.sent .read-receipt.delivered').forEach(el => {
        el.classList.remove('delivered');
        el.classList.add('read');
      });
    }
    
    renderContacts($('#searchInput').value);
  }, delay);
}

/* ═══════ SEARCH ═══════ */
$('#searchInput').addEventListener('input', e => {
  renderContacts(e.target.value);
});

/* ═══════ RESIZE HANDLER ═══════ */
window.addEventListener('resize', () => {
  if (window.innerWidth > 768) {
    $('#sidebar').classList.remove('hidden');
  }
});

/* ═══════ SERVICE WORKER ═══════ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

/* ═══════ INIT ═══════ */
loadConversations();
renderContacts();

})();
</script>
